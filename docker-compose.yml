services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_DATABASE: digital_hunter
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d

  api-server:

    build:
      context: .
      dockerfile: Dockerfile

    container_name: api-server

    environment:
      MYSQL_PASSWORD: '123456'
      MYSQL_DATABASE: digital_hunter
      MYSQL_HOST: mysql
      MYSQL_PORT: '3306'
      MYSQL_USER: root

      ports:
        - "8000:8000"

volumes:
  mysql_data:
